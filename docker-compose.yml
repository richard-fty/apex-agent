services:
  postgres:
    image: postgres:16-alpine
    container_name: apex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-apex_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - apex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex} -d ${POSTGRES_DB:-apex_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  apex_postgres_data:
