<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Counter App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 48px 40px 40px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    h1 {
      color: #e0d9ff;
      font-weight: 500;
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .display {
      font-size: 5.5rem;
      font-weight: 700;
      color: #fff;
      margin: 8px 0 24px;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
      text-shadow: 0 0 40px rgba(138, 107, 255, 0.3);
    }
    .display.negative {
      color: #ff6b6b;
      text-shadow: 0 0 40px rgba(255, 107, 107, 0.3);
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    button {
      border: none;
      border-radius: 16px;
      padding: 14px 0;
      font-size: 1.4rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      flex: 1;
    }
    button:active {
      transform: scale(0.92);
    }
    .btn-minus {
      background: #ff4757;
      color: #fff;
    }
    .btn-minus:hover {
      background: #ff6b7a;
      box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
    }
    .btn-plus {
      background: #2ed573;
      color: #fff;
    }
    .btn-plus:hover {
      background: #3ae07a;
      box-shadow: 0 0 20px rgba(46, 213, 115, 0.4);
    }
    .btn-reset {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      flex: 0.6;
    }
    .btn-reset:hover {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }
    .step-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #aaa;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .step-control input {
      width: 64px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border 0.2s;
    }
    .step-control input:focus {
      border-color: #8a6bff;
    }
    .step-control label {
      color: #999;
    }
    .history {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .history summary {
      color: #888;
      cursor: pointer;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .history summary:hover {
      color: #bbb;
    }
    .history-list {
      list-style: none;
      max-height: 140px;
      overflow-y: auto;
      margin-top: 10px;
      text-align: left;
      padding: 0 4px;
    }
    .history-list li {
      color: #999;
      font-size: 0.82rem;
      padding: 4px 8px;
      border-radius: 6px;
      font-variant-numeric: tabular-nums;
    }
    .history-list li:nth-child(odd) {
      background: rgba(255,255,255,0.03);
    }
    .history-list li .h-value {
      color: #ddd;
      font-weight: 500;
    }
    .history-list li .h-step {
      color: #666;
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Counter</h1>
    <div class="display" id="display">0</div>

    <div class="controls">
      <button class="btn-minus" id="btnMinus">−</button>
      <button class="btn-plus" id="btnPlus">+</button>
      <button class="btn-reset" id="btnReset">↺</button>
    </div>

    <div class="step-control">
      <label for="stepInput">Step:</label>
      <input type="number" id="stepInput" value="1" min="1" max="100" />
    </div>

    <details class="history">
      <summary>History</summary>
      <ul class="history-list" id="historyList"></ul>
    </details>
  </div>

  <script>
    let count = 0;
    const maxHistory = 20;
    const history = [];

    const displayEl = document.getElementById('display');
    const btnMinus = document.getElementById('btnMinus');
    const btnPlus = document.getElementById('btnPlus');
    const btnReset = document.getElementById('btnReset');
    const stepInput = document.getElementById('stepInput');
    const historyList = document.getElementById('historyList');

    function getStep() {
      const v = parseInt(stepInput.value, 10);
      return isNaN(v) || v < 1 ? 1 : v;
    }

    function updateDisplay() {
      displayEl.textContent = count;
      displayEl.classList.toggle('negative', count < 0);
    }

    function addToHistory(prev, next, step) {
      history.push({ from: prev, to: next, step });
      if (history.length > maxHistory) history.shift();
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = history
        .map(h => {
          const direction = h.to > h.from ? '+' : '';
          return `<li>
            <span class="h-value">${h.to}</span>
            <span class="h-step">(${direction}${h.step})</span>
          </li>`;
        })
        .join('');
      // auto-scroll to bottom
      historyList.scrollTop = historyList.scrollHeight;
    }

    function increment() {
      const step = getStep();
      const prev = count;
      count += step;
      updateDisplay();
      addToHistory(prev, count, step);
    }

    function decrement() {
      const step = getStep();
      const prev = count;
      count -= step;
      updateDisplay();
      addToHistory(prev, count, -step);
    }

    function reset() {
      const prev = count;
      count = 0;
      updateDisplay();
      addToHistory(prev, count, 0);
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key === '+') {
        e.preventDefault();
        increment();
      } else if (e.key === 'ArrowDown' || e.key === '-') {
        e.preventDefault();
        decrement();
      } else if (e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        reset();
      }
    });

    // Event listeners
    btnPlus.addEventListener('click', increment);
    btnMinus.addEventListener('click', decrement);
    btnReset.addEventListener('click', reset);

    // Initialize history with starting state
    history.push({ from: 0, to: 0, step: 0 });
    renderHistory();
  </script>
</body>
</html>
